<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FIFA Turnaj</title>
<style>
  :root {
    --bg: #07140f;
    --grass: #0f3b25;
    --grass-2: #155436;
    --panel: rgba(14, 29, 24, .94);
    --panel-2: rgba(20, 50, 38, .9);
    --panel-3: rgba(10, 22, 18, .72);
    --border: rgba(177, 219, 188, .18);
    --line: rgba(235, 255, 240, .16);
    --text: #eef8f0;
    --muted: #aabdaf;
    --accent: #d82035;
    --accent-2: #ff5a66;
    --lime: #7fdb82;
    --gold: #d4af37;
    --bronze: #cd7f32;
    --winner: #214f32;
    --loser: #452532;
    --shadow: 0 16px 40px rgba(0,0,0,.34);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text);
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body {
    background:
      radial-gradient(circle at 50% 18%, rgba(127,219,130,.18), transparent 27%),
      linear-gradient(90deg, transparent 0 10%, rgba(255,255,255,.045) 10% 10.4%, transparent 10.4% 20%, rgba(255,255,255,.035) 20% 20.4%, transparent 20.4% 30%, rgba(255,255,255,.045) 30% 30.4%, transparent 30.4% 40%, rgba(255,255,255,.035) 40% 40.4%, transparent 40.4% 50%, rgba(255,255,255,.045) 50% 50.4%, transparent 50.4% 60%, rgba(255,255,255,.035) 60% 60.4%, transparent 60.4% 70%, rgba(255,255,255,.045) 70% 70.4%, transparent 70.4% 80%, rgba(255,255,255,.035) 80% 80.4%, transparent 80.4%),
      linear-gradient(180deg, #082014 0%, #0f3b25 42%, #07140f 100%);
    background-attachment: fixed;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent calc(50% - 1px), var(--line) calc(50% - 1px) calc(50% + 1px), transparent calc(50% + 1px)),
      radial-gradient(circle at 50% 50%, transparent 0 88px, var(--line) 89px 91px, transparent 92px),
      linear-gradient(var(--line), var(--line)) center 9% / 34% 2px no-repeat,
      linear-gradient(var(--line), var(--line)) center 91% / 34% 2px no-repeat;
    opacity: .56;
  }
  a { color: var(--accent-2); }
  .app { position: relative; max-width: 1120px; margin: 0 auto; padding: 24px 18px 80px; }
  header.top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    padding: 14px 16px; border: 1px solid var(--border); border-radius: 14px;
    background: linear-gradient(135deg, rgba(12,35,25,.94), rgba(25,72,48,.88));
    box-shadow: var(--shadow); }
  header.top h1 { margin: 0; font-size: 23px; letter-spacing: .5px; text-transform: uppercase; }
  header.top .ball { width: 34px; height: 34px; border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, #111 0 4px, transparent 5px),
      radial-gradient(circle at 30% 28%, #fff 0 7px, transparent 8px),
      conic-gradient(from 18deg, #f7f7f7 0 18%, #101010 18% 30%, #f7f7f7 30% 48%, #101010 48% 61%, #f7f7f7 61% 80%, #101010 80% 91%, #f7f7f7 91%);
    border: 2px solid rgba(255,255,255,.85);
    box-shadow: 0 8px 24px rgba(0,0,0,.38); }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;
    background: rgba(7,20,15,.78); padding: 6px; border-radius: 12px; border: 1px solid var(--border);
    box-shadow: 0 10px 28px rgba(0,0,0,.22); backdrop-filter: blur(8px); }
  .tab { flex: 1 1 auto; min-width: 90px; text-align: center; padding: 10px 14px;
    border-radius: 8px; cursor: pointer; color: var(--muted); font-weight: 600; user-select: none;
    border: 1px solid transparent; transition: all .15s ease; }
  .tab:hover { color: var(--text); background: var(--panel-2); }
  .tab.active { color: #fff; background: linear-gradient(180deg, var(--accent-2), var(--accent)); border-color: rgba(255,255,255,.18); }
  .tab.disabled { opacity: .35; cursor: not-allowed; }
  .panel { position: relative; overflow: hidden; background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; box-shadow: var(--shadow); backdrop-filter: blur(10px); }
  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent 0 49.8%, rgba(255,255,255,.055) 49.8% 50.2%, transparent 50.2%),
      radial-gradient(circle at 50% 50%, transparent 0 74px, rgba(255,255,255,.045) 75px 77px, transparent 78px);
    opacity: .7;
  }
  .panel > * { position: relative; }
  .panel h2 { margin: 0 0 6px; font-size: 18px; text-transform: uppercase; letter-spacing: .03em; }
  .panel .sub { color: var(--muted); margin-bottom: 18px; }
  /* Sjednocená výška inputů, selectů a tlačítek, aby v .row seděly na jedné lince. */
  :where(input[type="text"], input[type="number"], select, button) {
    height: 38px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  /* label nyní: text nahoře, control dole, zarovnaný doleva; dříve byl text dole. */
  label.field { display: flex; flex-direction: column; gap: 6px; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  label.field > input,
  label.field > select { width: 100%; }
  input[type="text"], input[type="number"], select {
    background: rgba(6, 20, 14, .64); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 0 10px; font: inherit; outline: none; min-width: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  }
  input:focus, select:focus { border-color: var(--lime); box-shadow: 0 0 0 3px rgba(127,219,130,.12); }
  input.invalid { border-color: var(--accent); background: #2a1820; }
  button { background: linear-gradient(180deg, var(--accent-2), var(--accent)); color: #fff; border: 0; border-radius: 8px;
    padding: 0 16px; font: inherit; font-weight: 600; cursor: pointer; transition: filter .15s;
    display: inline-flex; align-items: center; justify-content: center; white-space: nowrap;
    box-shadow: 0 8px 18px rgba(216,32,53,.18); }
  button:hover { filter: brightness(1.08); }
  button.secondary { background: linear-gradient(180deg, rgba(30,76,54,.96), rgba(18,48,35,.96)); color: var(--text); border: 1px solid var(--border);
    box-shadow: 0 8px 18px rgba(0,0,0,.16); }
  button.ghost { background: rgba(7,20,15,.42); color: var(--muted); border: 1px solid var(--border); box-shadow: none; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 6px;
    background: rgba(6,20,14,.36); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  th { color: #d7eadb; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
    background: rgba(18,62,39,.64); }
  tr.qualifier td { background: rgba(127,219,130,.075); }
  tr.you td:first-child::before { content: ""; }
  .rank-1 td:first-child { color: var(--gold); font-weight: 700; }
  .rank-2 td:first-child { color: #c0c8d2; font-weight: 700; }
  .rank-3 td:first-child { color: var(--bronze); font-weight: 700; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: rgba(6,20,14,.6); border: 1px solid var(--border); color: var(--muted); }
  .pill.gold { color: var(--gold); border-color: rgba(212,175,55,.4); }
  .pill.bronze { color: var(--bronze); border-color: rgba(205,127,50,.4); }
  .pill.accent { color: var(--accent-2); border-color: rgba(255,77,99,.4); }
  .pill.team { color: var(--accent-2); border-color: rgba(255,77,99,.4);
    font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
  .empty { color: var(--muted); padding: 24px 8px; text-align: center; border: 1px dashed var(--line);
    border-radius: 10px; margin-top: 12px; background: rgba(6,20,14,.32); }
  .matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 16px; }
  .match { position: relative; overflow: hidden; background:
      linear-gradient(90deg, rgba(255,255,255,.045) 0 1px, transparent 1px 50%, rgba(255,255,255,.045) 50% calc(50% + 1px), transparent calc(50% + 1px)),
      linear-gradient(180deg, rgba(22,70,45,.86), rgba(10,30,22,.88));
    border: 1px solid var(--border); border-radius: 10px; padding: 12px; box-shadow: 0 10px 22px rgba(0,0,0,.18); }
  .match::before { content: ""; position: absolute; inset: 8px; border: 1px solid rgba(255,255,255,.045); border-radius: 7px; pointer-events: none; }
  .match > * { position: relative; }
  .match .head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .match .head .tag { font-size: 11px; color: #d7eadb; text-transform: uppercase; letter-spacing: .05em; }
  .match .side { display: flex; align-items: center; gap: 8px; padding: 7px 8px; margin: 5px 0;
    background: rgba(6,20,14,.38); border: 1px solid rgba(255,255,255,.055); border-radius: 8px; }
  .match .side .name { flex: 1; font-weight: 600; }
  .match .side.win { border-color: rgba(127,219,130,.38); background: rgba(35,91,52,.48); }
  .match .side.win .name { color: #c8ffd0; }
  .match .side.lose .name { color: #f0b8c0; opacity: .8; }
  .match .side input.score { width: 64px; height: 32px; text-align: center; font-weight: 700; }
  .match .foot { display: flex; gap: 8px; margin-top: 8px; }
  .match .foot button { flex: 1; height: 36px; font-size: 14px; }
  .match .extra { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .match .extra .row { gap: 8px; }
  .match .extra label { font-size: 12px; color: var(--muted); }
  .match .extra input.score { height: 32px; }
  .round-title { font-size: 12px; color: #d7eadb; text-transform: uppercase; letter-spacing: .05em;
    margin: 18px 0 6px; padding: 0 0 5px 24px; border-bottom: 1px solid var(--border); position: relative; }
  .round-title::before { content: ""; position: absolute; left: 0; top: 2px; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #111 0 3px, #fff 4px 8px, #111 9px); border: 1px solid rgba(255,255,255,.7); }
  .round-title:first-child { margin-top: 0; }
  /* Playoff bracket */
  .bracket { display: flex; gap: 18px; align-items: stretch; overflow-x: auto; padding: 8px 4px 18px; }
  .bracket-col { display: flex; flex-direction: column; justify-content: space-around; gap: 14px; min-width: 220px; }
  .bracket-col h3 { font-size: 12px; text-align: center; color: var(--muted); text-transform: uppercase; margin: 0 0 6px; letter-spacing: .05em; }
  .seed-pill { font-size: 10px; color: var(--muted); margin-left: 6px; }
  .podium { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .podium .card { padding: 22px; text-align: center; border-radius: 12px; box-shadow: 0 14px 30px rgba(0,0,0,.22); }
  .podium .gold-card { background: linear-gradient(180deg, rgba(212,175,55,.24), rgba(22,70,45,.34));
    border: 1px solid rgba(212,175,55,.5); }
  .podium .bronze-card { background: linear-gradient(180deg, rgba(205,127,50,.22), rgba(22,70,45,.32));
    border: 1px solid rgba(205,127,50,.5); }
  .podium .trophy { font-size: 48px; }
  .podium .name { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .podium .gold-card .name { color: var(--gold); }
  .podium .bronze-card .name { color: var(--bronze); }
  .podium .sub { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .grid-2 label.field { width: 100%; }
  .setup-tools { display: grid; gap: 18px; padding: 14px; border: 1px solid var(--border); border-radius: 12px;
    background:
      linear-gradient(90deg, transparent 0 49.8%, rgba(255,255,255,.05) 49.8% 50.2%, transparent 50.2%),
      linear-gradient(180deg, rgba(20,61,40,.54), rgba(7,20,15,.28)); }
  .setup-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-top: 18px; padding-top: 18px; border-top: 1px dashed var(--border); }
  .setup-actions button { min-width: 150px; }
  /* Wheel of fortune */
  .wheel-wrap { display: grid; grid-template-columns: minmax(260px, 360px) 1fr; gap: 24px;
    align-items: start; margin-top: 28px; padding: 22px; border: 1px solid var(--border); border-radius: 12px;
    background:
      radial-gradient(circle at 50% 50%, transparent 0 84px, rgba(255,255,255,.045) 85px 87px, transparent 88px),
      linear-gradient(135deg, rgba(18,62,39,.62), rgba(7,20,15,.42)); }
  .wheel-stage { position: relative; aspect-ratio: 1; max-width: 360px; width: 100%;
    justify-self: center; }
  .wheel-svg { width: 100%; height: 100%; display: block; transform: rotate(0deg);
    transition: transform 7.2s cubic-bezier(.12,.72,.08,1); will-change: transform; }
  .wheel-pointer { position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 22px solid #f5f7f0; filter: drop-shadow(0 2px 3px rgba(0,0,0,.55)); z-index: 2; }
  .wheel-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 30px; height: 30px; border-radius: 50%; background: var(--panel);
    border: 3px solid #f5f7f0; box-shadow: 0 4px 14px rgba(0,0,0,.38); z-index: 1; }
  .wheel-side h3 { margin: 0 0 6px; font-size: 14px; color: #d7eadb;
    text-transform: uppercase; letter-spacing: .04em; }
  .wheel-side .sub { margin-bottom: 14px; }
  .wheel-form { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px;
    align-items: end; margin-bottom: 14px; }
  .wheel-form label.field { min-width: 0; }
  .wheel-form button { min-width: 110px; }
  .wheel-list { list-style: none; padding: 0; margin: 0 0 14px; max-height: 220px; overflow: auto;
    border: 1px solid var(--border); border-radius: 8px; background: rgba(6,20,14,.46); }
  .wheel-list li { display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .wheel-list li:last-child { border-bottom: 0; }
  .wheel-list li > span:first-child { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wheel-list li .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; vertical-align: middle; }
  .wheel-list li button { flex: 0 0 auto; height: 28px; padding: 0 10px; font-size: 12px; }
  .wheel-empty { color: var(--muted); padding: 12px; font-size: 13px; }
  .wheel-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 2px; }
  .wheel-actions button { min-width: 118px; }
  .wheel-toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: linear-gradient(180deg, var(--accent-2), var(--accent)); color: #fff; padding: 12px 18px; border-radius: 10px; font-weight: 700;
    box-shadow: 0 6px 24px rgba(0,0,0,.45); opacity: 0; transition: opacity .25s, transform .25s;
    z-index: 10; pointer-events: none; }
  .wheel-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .badge-1 { background: rgba(212,175,55,.2); color: var(--gold); }
  .badge-3 { background: rgba(205,127,50,.2); color: var(--bronze); }
  .help { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  @media (max-width: 700px) {
    .bracket { flex-direction: column; }
    .bracket-col { min-width: 0; }
    .podium { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .setup-actions button { width: 100%; }
    .wheel-wrap { grid-template-columns: 1fr; gap: 18px; }
    .wheel-form { grid-template-columns: 1fr; }
    .wheel-form button,
    .wheel-actions button { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="ball" aria-hidden="true"></div>
    <h1>FIFA Turnaj</h1>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="view" class="panel"></main>
</div>
<div id="wheelToast" class="wheel-toast" role="status" aria-live="polite"></div>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 *  State + persistence
 * ------------------------------------------------------------------ */
const STORAGE_KEY = "fifa-tournament-v1";

const TABS = [
  { id: "setup",    label: "Nastavení" },
  { id: "schedule", label: "Rozlosování" },
  { id: "group",    label: "Skupina" },
  { id: "playoff",  label: "Playoff" },
  { id: "champion", label: "Vítěz" },
];

let state = loadState();
let currentTab = "setup";

function defaultState() {
  return {
    phase: "setup",
    playerCount: 4,
    players: [],
    groupMatches: [],
    playoffConfig: { size: 4, bestOf: 1 },
    qualifiers: [],
    playoff: { qf: [], sf: [], bronze: null, final: null },
    champion: null,
    bronzeWinner: null,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    // Migrate legacy `players: string[]` to `players: {name, team}[]`.
    if (merged.players.length && typeof merged.players[0] === "string") {
      merged.players = merged.players.map(name => ({ name, team: "" }));
    }
    return merged;
  } catch (e) {
    console.warn("Failed to load state, resetting.", e);
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Failed to save state", e);
  }
}

function resetTournament() {
  if (!confirm("Resetovat celý turnaj? Smažou se všichni hráči, výsledky i pavouk.")) return;
  state = defaultState();
  saveState();
  currentTab = "setup";
  render();
}

/* ------------------------------------------------------------------ *
 *  Wheel of fortune
 * ------------------------------------------------------------------ */
const WHEEL_KEY = "fifa-tournament-wheel-v1";
const WHEEL_COLORS = ["#d82035", "#f1c232", "#1f8f55", "#2366d1", "#f47b20", "#8e44ad", "#0f766e", "#f5f7f0", "#7fdb82", "#cd7f32"];
const WHEEL_SPIN_MS = 7200;

function loadWheel() {
  try {
    const raw = localStorage.getItem(WHEEL_KEY);
    if (!raw) return { teams: [], rotation: 0, spinning: false };
    const parsed = JSON.parse(raw);
    const merged = Object.assign({ teams: [], rotation: 0, spinning: false }, parsed);
    merged.spinning = false;
    return merged;
  } catch (e) { return { teams: [], rotation: 0, spinning: false }; }
}
function saveWheel() {
  try { localStorage.setItem(WHEEL_KEY, JSON.stringify(wheelState)); } catch (e) {}
}
let wheelState = loadWheel();

function wheelAddTeam(name) {
  const t = (name || "").trim();
  if (!t) return false;
  if (wheelState.teams.some(x => x.name.toLowerCase() === t.toLowerCase())) return false;
  wheelState.teams.push({ name: t, color: WHEEL_COLORS[(wheelState.teams.length) % WHEEL_COLORS.length] });
  saveWheel();
  return true;
}
function wheelRemoveTeam(idx) {
  wheelState.teams.splice(idx, 1);
  saveWheel();
}

// Vypočítá index výherce (slicu, na kterou ukazuje ukazatel nahoře) z aktuálního natočení kola.
// Ukazatel je v 0° (= nahoře). Slice 0 začíná v 0° a roste po směru hodin. Rotace v SVG je CW (kladná).
function wheelWinnerIndex(rotation, teamCount) {
  const n = teamCount || wheelState.teams.length;
  if (!n) return -1;
  const sliceAngle = 360 / n;
  // Kde aktuálně "ukazuje" ukazatel po aplikaci rotace? V SVG rotujeme CW, takže slice, jehož
  // střed leží v bodě (360 - rot) % 360. Vydělíme sliceAngle a zaokrouhlíme dolů.
  const norm = (((rotation == null ? wheelState.rotation : rotation) % 360) + 360) % 360;
  const pointerAngle = (360 - norm) % 360;
  return Math.floor(pointerAngle / sliceAngle) % n;
}

function showWheelToast(text) {
  const t = document.getElementById("wheelToast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(showWheelToast._h);
  showWheelToast._h = setTimeout(() => t.classList.remove("show"), 2200);
}

function wheelSpin() {
  if (wheelState.spinning) return;
  const n = wheelState.teams.length;
  if (n < 1) { showWheelToast("Přidej aspoň jeden tým."); return; }

  wheelState.spinning = true;
  const sliceAngle = 360 / n;
  const targetIdx = Math.floor(Math.random() * n);
  const targetCenter = targetIdx * sliceAngle + sliceAngle / 2;
  const desiredNorm = (360 - targetCenter) % 360;
  const currentNorm = ((wheelState.rotation % 360) + 360) % 360;
  const delta = (desiredNorm - currentNorm + 360) % 360;
  const spins = 8 + Math.floor(Math.random() * 5);
  wheelState.rotation += spins * 360 + delta;
  saveWheel();

  // Aplikuj na DOM; CSS transition zajistí samotné zpomalení kola.
  const svg = document.querySelector(".wheel-svg");
  if (svg) {
    svg.style.transform = "rotate(" + wheelState.rotation + "deg)";
  }

  clearTimeout(wheelSpin._t);
  wheelSpin._t = setTimeout(() => {
    const idx = wheelWinnerIndex(wheelState.rotation, n);
    const winner = wheelState.teams[idx];
    wheelState.teams.splice(idx, 1);
    wheelState.spinning = false;
    saveWheel();
    render();
    if (winner) showWheelToast("Vybraný tým: " + winner.name);
  }, WHEEL_SPIN_MS + 120);
}

/* ------------------------------------------------------------------ *
 *  Round-robin schedule (circle method)
 * ------------------------------------------------------------------ */
function generateGroupMatches(players) {
  const n = players.length;
  if (n < 2) return [];
  const list = players.slice();
  const isOdd = n % 2 === 1;
  if (isOdd) list.push("BYE");
  const N = list.length;
  const rounds = N - 1;
  const half = N / 2;
  const arr = list.slice();
  const matches = [];
  let id = 0;
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < half; i++) {
      const a = arr[i];
      const b = arr[N - 1 - i];
      if (a !== "BYE" && b !== "BYE") {
        matches.push({
          id: "g" + (id++),
          round: r + 1,
          p1: a, p2: b,
          g1: null, g2: null,
          ot1: 0, ot2: 0,
          penWinner: null,
          played: false,
        });
      }
    }
    // rotate everyone except the first element
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr.splice(0, arr.length, fixed, ...rest);
  }
  return matches;
}

/* ------------------------------------------------------------------ *
 *  Standings
 * ------------------------------------------------------------------ */
function computeStandings(players, matches) {
  const table = {};
  players.forEach(p => { table[p] = { p, mp:0, w:0, otw:0, d:0, otl:0, l:0, gf:0, ga:0, gd:0, pts:0 }; });
  matches.forEach(m => {
    if (!m.played) return;
    const a = table[m.p1], b = table[m.p2];
    if (!a || !b) return;
    a.mp++; b.mp++;
    const total1 = (m.g1 || 0) + (m.ot1 || 0);
    const total2 = (m.g2 || 0) + (m.ot2 || 0);
    a.gf += total1; a.ga += total2;
    b.gf += total2; b.ga += total1;
    if (m.g1 > m.g2) { a.w++; a.pts += 3; b.l++; }
    else if (m.g1 < m.g2) { b.w++; b.pts += 3; a.l++; }
    else {
      if (total1 > total2 || (total1 === total2 && m.penWinner === 1)) {
        a.otw++; a.pts += 2; b.otl++; b.pts += 1;
      } else if (total2 > total1 || (total1 === total2 && m.penWinner === 2)) {
        b.otw++; b.pts += 2; a.otl++; a.pts += 1;
      } else {
        a.d++; b.d++; a.pts += 1; b.pts += 1;
      }
    }
  });
  Object.values(table).forEach(t => { t.gd = t.gf - t.ga; });
  return Object.values(table).sort((x, y) =>
    y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || x.p.localeCompare(y.p));
}

/* ------------------------------------------------------------------ *
 *  Playoff generation
 * ------------------------------------------------------------------ */
function buildPlayoff(seeds, size, bestOf) {
  // seeds[0] is #1 qualifier, etc.
  const out = { qf: [], sf: [], bronze: null, final: null };
  if (size === 2) {
    out.final = mkMatch("f1", seeds[0], seeds[1]);
    out.bronze = mkMatch("b1", seeds[2] || null, seeds[3] || null);
  } else if (size === 4) {
    out.sf = [
      mkMatch("s1", seeds[0], seeds[3]),
      mkMatch("s2", seeds[1], seeds[2]),
    ];
    out.bronze = mkMatch("b1", null, null);
    out.final = mkMatch("f1", null, null);
  } else if (size === 6) {
    // Top 2 get byes into SF; seeds 3..6 play a play-in QF.
    out.qf = [
      mkMatch("q1", seeds[2], seeds[5]),
      mkMatch("q2", seeds[3], seeds[4]),
    ];
    out.sf = [
      mkMatch("s1", seeds[0], null), // winner q1
      mkMatch("s2", seeds[1], null), // winner q2
    ];
    out.bronze = mkMatch("b1", null, null);
    out.final = mkMatch("f1", null, null);
  } else if (size === 8) {
    out.qf = [
      mkMatch("q1", seeds[0], seeds[7]),
      mkMatch("q2", seeds[1], seeds[6]),
      mkMatch("q3", seeds[2], seeds[5]),
      mkMatch("q4", seeds[3], seeds[4]),
    ];
    out.sf = [
      mkMatch("s1", null, null), // winners q1, q2
      mkMatch("s2", null, null), // winners q3, q4
    ];
    out.bronze = mkMatch("b1", null, null);
    out.final = mkMatch("f1", null, null);
  }
  out.bestOf = bestOf;
  return out;
}

function mkMatch(id, a, b) {
  return { id, a, b, g1: null, g2: null, ot1: 0, ot2: 0, penWinner: null, played: false };
}

function findMatch(p, id) {
  if (!p) return null;
  if (id === "f1") return p.final;
  if (id === "b1") return p.bronze;
  if (id && id.startsWith("q")) return p.qf.find(m => m.id === id);
  if (id && id.startsWith("s")) return p.sf.find(m => m.id === id);
  return null;
}

function matchWinner(m) {
  if (!m || !m.played) return null;
  const total1 = (m.g1 || 0) + (m.ot1 || 0);
  const total2 = (m.g2 || 0) + (m.ot2 || 0);
  if (total1 > total2) return m.a;
  if (total2 > total1) return m.b;
  if (m.penWinner === 1) return m.a;
  if (m.penWinner === 2) return m.b;
  return null;
}

function matchLoser(m) {
  const w = matchWinner(m);
  if (!w) return null;
  return w === m.a ? m.b : m.a;
}

function advancePlayoff() {
  // Walk the bracket and propagate winners forward.
  const p = state.playoff;
  const configSize = state.playoffConfig.size;
  if (configSize === 2) {
    // nothing to advance
  } else if (configSize === 4) {
    const w1 = matchWinner(p.sf[0]); const w2 = matchWinner(p.sf[1]);
    const l1 = matchLoser(p.sf[0]); const l2 = matchLoser(p.sf[1]);
    if (w1 && w2) { p.final.a = w1; p.final.b = w2; }
    if (l1 && l2) { p.bronze.a = l1; p.bronze.b = l2; }
  } else if (configSize === 6) {
    const q1w = matchWinner(p.qf[0]); const q2w = matchWinner(p.qf[1]);
    if (q1w) p.sf[0].b = q1w;
    if (q2w) p.sf[1].b = q2w;
    const w1 = matchWinner(p.sf[0]); const w2 = matchWinner(p.sf[1]);
    const l1 = matchLoser(p.sf[0]); const l2 = matchLoser(p.sf[1]);
    if (w1 && w2) { p.final.a = w1; p.final.b = w2; }
    if (l1 && l2) { p.bronze.a = l1; p.bronze.b = l2; }
  } else if (configSize === 8) {
    if (matchWinner(p.qf[0])) p.sf[0].a = matchWinner(p.qf[0]);
    if (matchWinner(p.qf[1])) p.sf[0].b = matchWinner(p.qf[1]);
    if (matchWinner(p.qf[2])) p.sf[1].a = matchWinner(p.qf[2]);
    if (matchWinner(p.qf[3])) p.sf[1].b = matchWinner(p.qf[3]);
    const w1 = matchWinner(p.sf[0]); const w2 = matchWinner(p.sf[1]);
    const l1 = matchLoser(p.sf[0]); const l2 = matchLoser(p.sf[1]);
    if (w1 && w2) { p.final.a = w1; p.final.b = w2; }
    if (l1 && l2) { p.bronze.a = l1; p.bronze.b = l2; }
  }
  // Crown
  if (p.final && p.final.played) {
    state.champion = matchWinner(p.final);
  }
  if (p.bronze && p.bronze.played) {
    state.bronzeWinner = matchWinner(p.bronze);
  }
}

/* ------------------------------------------------------------------ *
 *  Helpers
 * ------------------------------------------------------------------ */
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "class") e.className = attrs[k];
      else if (k === "style") e.setAttribute("style", attrs[k]);
      else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
      else if (k === "html") e.innerHTML = attrs[k];
      else if (attrs[k] !== false && attrs[k] != null) e.setAttribute(k, attrs[k]);
    }
  }
  if (children != null) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null || c === false) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function parseScoreInput(v) {
  if (v === "" || v == null) return null;
  const n = Number(v);
  if (!Number.isFinite(n) || n < 0 || Math.floor(n) !== n) return NaN;
  return n;
}

// Vrátí objekt hráče {name, team} pro dané jméno, nebo null.
function getPlayer(name) {
  if (!name) return null;
  const p = state.players.find(x => (x.name || x) === name);
  if (!p) return null;
  return typeof p === "string" ? { name: p, team: "" } : p;
}

// Vloží do `parent` uzel se jménem a volitelnou "týmovou" pillou.
function appendPlayerName(parent, name) {
  parent.appendChild(el("span", { class: "name" }, name || "Bude určeno"));
  const t = getPlayer(name);
  if (t && t.team) {
    parent.appendChild(el("span", { class: "pill team" }, t.team));
  }
}

function formatGroupMatchScore(m) {
  if (!m || !m.played) return "Nadcházející";
  const total1 = (m.g1 || 0) + (m.ot1 || 0);
  const total2 = (m.g2 || 0) + (m.ot2 || 0);
  if (m.g1 === m.g2 && total1 === total2 && m.penWinner) {
    return total1 + " : " + total2 + " pen.";
  }
  if (m.g1 === m.g2) {
    return total1 + " : " + total2 + " pp";
  }
  return m.g1 + " : " + m.g2;
}

function groupMatchStatus(m) {
  if (!m.played) return "Čeká se";
  if (m.g1 === m.g2 && m.penWinner) return "Penalty";
  if (m.g1 === m.g2) return "Prodloužení";
  return "Odehráno";
}

function groupMatchWinner(m) {
  if (!m || !m.played) return null;
  if (m.g1 > m.g2) return m.p1;
  if (m.g2 > m.g1) return m.p2;
  const total1 = (m.g1 || 0) + (m.ot1 || 0);
  const total2 = (m.g2 || 0) + (m.ot2 || 0);
  if (total1 > total2) return m.p1;
  if (total2 > total1) return m.p2;
  if (m.penWinner === 1) return m.p1;
  if (m.penWinner === 2) return m.p2;
  return null;
}

function groupMatchLoser(m) {
  const winner = groupMatchWinner(m);
  if (!winner) return null;
  return winner === m.p1 ? m.p2 : m.p1;
}

function tabEnabled(id) {
  if (id === "setup") return true;
  if (!state.players.length) return false;
  if (id === "schedule" || id === "group") return state.groupMatches.length > 0;
  if (id === "playoff") return state.groupMatches.some(m => m.played);
  if (id === "champion") return !!state.champion;
  return false;
}

/* ------------------------------------------------------------------ *
 *  Render
 * ------------------------------------------------------------------ */
function render() {
  // tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  TABS.forEach(t => {
    const enabled = tabEnabled(t.id);
    const cls = "tab" + (t.id === currentTab ? " active" : "") + (!enabled ? " disabled" : "");
    const node = el("div", { class: cls, role: "tab" }, t.label);
    node.addEventListener("click", () => {
      if (!enabled) return;
      currentTab = t.id;
      render();
    });
    tabsEl.appendChild(node);
  });

  const view = document.getElementById("view");
  view.innerHTML = "";
  if (currentTab === "setup") renderSetup(view);
  else if (currentTab === "schedule") renderSchedule(view);
  else if (currentTab === "group") renderGroup(view);
  else if (currentTab === "playoff") renderPlayoff(view);
  else if (currentTab === "champion") renderChampion(view);
}

function renderSetup(view) {
  const started = state.players.length > 0;
  view.appendChild(el("h2", null, "Nastavení turnaje"));
  view.appendChild(el("div", { class: "sub" }, "Zvol počet hráčů (4–12), zadej jejich jména a spusť turnaj."));
  const tools = el("div", { class: "setup-tools" });
  const row = el("div", { class: "row" });
  const countInput = el("input", { type: "number", min: "4", max: "12", value: state.playerCount });
  countInput.addEventListener("change", () => {
    let n = parseInt(countInput.value, 10);
    if (!Number.isFinite(n)) n = 4;
    n = Math.max(4, Math.min(12, n));
    state.playerCount = n;
    const cur = state.players.map(p => typeof p === "string" ? { name: p, team: "" } : (p || { name: "", team: "" }));
    state.players = cur.slice(0, n);
    while (state.players.length < n) state.players.push({ name: "", team: "" });
    saveState();
    render();
  });
  row.appendChild(el("label", { class: "field", style: "min-width:160px" }, ["Počet hráčů (4–12)", countInput]));
  tools.appendChild(row);

  const names = el("div", { class: "grid-2" });
  for (let i = 0; i < state.playerCount; i++) {
    const p = state.players[i] || { name: "", team: "" };
    const nameInp = el("input", { type: "text", placeholder: "Hráč " + (i+1), value: p.name || "" });
    const teamInp = el("input", { type: "text", placeholder: "Tým (volitelné)", value: p.team || "" });
    nameInp.addEventListener("input", () => {
      state.players[i] = { name: nameInp.value, team: teamInp.value };
      saveState();
    });
    teamInp.addEventListener("input", () => {
      state.players[i] = { name: nameInp.value, team: teamInp.value };
      saveState();
    });
    const cell = el("div", { class: "row" });
    cell.appendChild(el("label", { class: "field", style: "flex:1 1 0; min-width:0" }, ["Hráč " + (i+1), nameInp]));
    cell.appendChild(el("label", { class: "field", style: "flex:1 1 0; min-width:0" }, ["Tým", teamInp]));
    names.appendChild(cell);
  }
  tools.appendChild(names);

  const cta = el("div", { class: "setup-actions" });
  if (!started) {
    const btn = el("button", null, "Spustit turnaj");
    btn.addEventListener("click", () => {
      const cleaned = state.players.map(p => ({
        name: (p && p.name || "").trim(),
        team: (p && p.team || "").trim(),
      }));
      if (cleaned.some(p => !p.name)) { alert("Vyplň prosím jména všech hráčů."); return; }
      const names = cleaned.map(p => p.name);
      if (new Set(names).size !== names.length) { alert("Jména hráčů se nesmí opakovat."); return; }
      state.players = cleaned;
      state.groupMatches = generateGroupMatches(names);
      state.phase = "group";
      state.qualifiers = [];
      state.playoff = { qf: [], sf: [], bronze: null, final: null };
      state.champion = null;
      state.bronzeWinner = null;
      saveState();
      currentTab = "schedule";
      render();
    });
    cta.appendChild(btn);
  } else {
    const regen = el("button", { class: "secondary" }, "Vygenerovat rozlosování znovu");
    regen.addEventListener("click", () => {
      if (!confirm("Tímto se vymažou všechny výsledky zápasů ve skupině. Pokračovat?")) return;
      const cleaned = state.players.map(p => ({
        name: (p && p.name || "").trim(),
        team: (p && p.team || "").trim(),
      }));
      if (cleaned.some(p => !p.name)) { alert("Nejdříve vyplň všechna jména hráčů."); return; }
      const names = cleaned.map(p => p.name);
      if (new Set(names).size !== names.length) { alert("Jména hráčů se nesmí opakovat."); return; }
      state.players = cleaned;
      state.groupMatches = generateGroupMatches(names);
      state.qualifiers = [];
      state.playoff = { qf: [], sf: [], bronze: null, final: null };
      state.champion = null;
      state.bronzeWinner = null;
      saveState();
      currentTab = "schedule";
      render();
    });
    cta.appendChild(regen);
  }
  const reset = el("button", { class: "ghost" }, "Resetovat turnaj");
  reset.addEventListener("click", resetTournament);
  cta.appendChild(reset);
  tools.appendChild(cta);
  view.appendChild(tools);
  renderWheel(view);
}

function renderWheel(view) {
  const wrap = el("div", { class: "wheel-wrap" });
  const stage = el("div", { class: "wheel-stage" });
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "wheel-svg");
  svg.setAttribute("viewBox", "0 0 200 200");
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "Kolo štěstí pro losování týmů");
  svg.style.transform = "rotate(" + wheelState.rotation + "deg)";

  if (wheelState.teams.length) {
    const n = wheelState.teams.length;
    const sliceAngle = 360 / n;
    wheelState.teams.forEach((team, i) => {
      if (n === 1) {
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", "100");
        circle.setAttribute("cy", "100");
        circle.setAttribute("r", "94");
        circle.setAttribute("fill", team.color || WHEEL_COLORS[i % WHEEL_COLORS.length]);
        circle.setAttribute("stroke", "#0c2319");
        circle.setAttribute("stroke-width", "2");
        svg.appendChild(circle);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", "100");
        text.setAttribute("y", "100");
        text.setAttribute("fill", "#fff");
        text.setAttribute("font-size", "11");
        text.setAttribute("font-weight", "700");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle");
        text.textContent = team.name.length > 18 ? team.name.slice(0, 17) + "…" : team.name;
        svg.appendChild(text);
        return;
      }
      const start = i * sliceAngle;
      const end = start + sliceAngle;
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", wheelSlicePath(100, 100, 94, start, end));
      path.setAttribute("fill", team.color || WHEEL_COLORS[i % WHEEL_COLORS.length]);
      path.setAttribute("stroke", "#0c2319");
      path.setAttribute("stroke-width", "2");
      svg.appendChild(path);

      const labelAngle = start + sliceAngle / 2;
      const labelPos = wheelPoint(100, 100, Math.min(66, 42 + n * 2), labelAngle);
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", labelPos.x);
      text.setAttribute("y", labelPos.y);
      text.setAttribute("fill", "#fff");
      text.setAttribute("font-size", n > 8 ? "7" : "9");
      text.setAttribute("font-weight", "700");
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("dominant-baseline", "middle");
      text.setAttribute("transform", "rotate(" + labelAngle + " " + labelPos.x + " " + labelPos.y + ")");
      text.textContent = team.name.length > 16 ? team.name.slice(0, 15) + "…" : team.name;
      svg.appendChild(text);
    });
  } else {
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", "100");
    circle.setAttribute("cy", "100");
    circle.setAttribute("r", "94");
    circle.setAttribute("fill", "#143226");
    circle.setAttribute("stroke", "#2a3a4d");
    circle.setAttribute("stroke-width", "2");
    svg.appendChild(circle);
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", "100");
    text.setAttribute("y", "100");
    text.setAttribute("fill", "#9aa7b6");
    text.setAttribute("font-size", "10");
    text.setAttribute("font-weight", "700");
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "middle");
    text.textContent = "Přidej týmy";
    svg.appendChild(text);
  }

  stage.appendChild(el("div", { class: "wheel-pointer", "aria-hidden": "true" }));
  stage.appendChild(svg);
  stage.appendChild(el("div", { class: "wheel-hub", "aria-hidden": "true" }));
  wrap.appendChild(stage);

  const side = el("div", { class: "wheel-side" });
  side.appendChild(el("h3", null, "Kolo štěstí"));
  side.appendChild(el("div", { class: "sub" },
    "Přidej týmy, roztoč kolo a vybraný tým se po losování odstraní."));

  const input = el("input", { type: "text", placeholder: "Např. Real Madrid" });
  const addBtn = el("button", { class: "secondary" }, "Přidat tým");
  function addFromInput() {
    if (!wheelAddTeam(input.value)) {
      showWheelToast(input.value.trim() ? "Tým už je v kole." : "Zadej název týmu.");
      return;
    }
    input.value = "";
    render();
  }
  input.addEventListener("keydown", ev => {
    if (ev.key === "Enter") addFromInput();
  });
  addBtn.addEventListener("click", addFromInput);
  side.appendChild(el("div", { class: "wheel-form" }, [
    el("label", { class: "field" }, ["Tým do kola", input]),
    addBtn,
  ]));

  const list = el("ul", { class: "wheel-list" });
  if (wheelState.teams.length) {
    wheelState.teams.forEach((team, i) => {
      const remove = el("button", { class: "ghost", type: "button" }, "Smazat");
      remove.addEventListener("click", () => {
        wheelRemoveTeam(i);
        render();
      });
      const label = el("span", null, [
        el("span", { class: "swatch", style: "background:" + (team.color || WHEEL_COLORS[i % WHEEL_COLORS.length]) }),
        team.name,
      ]);
      list.appendChild(el("li", null, [label, remove]));
    });
  } else {
    list.appendChild(el("li", { class: "wheel-empty" }, "Zatím žádné týmy v kole."));
  }
  side.appendChild(list);

  const spinBtn = el("button", null, wheelState.spinning ? "Losuji..." : "Roztočit");
  spinBtn.disabled = wheelState.spinning || wheelState.teams.length < 1;
  spinBtn.addEventListener("click", wheelSpin);
  const clearBtn = el("button", { class: "ghost" }, "Vyčistit kolo");
  clearBtn.disabled = wheelState.spinning || wheelState.teams.length === 0;
  clearBtn.addEventListener("click", () => {
    if (!confirm("Smazat všechny týmy z kola?")) return;
    wheelState.teams = [];
    wheelState.rotation = 0;
    saveWheel();
    render();
  });
  side.appendChild(el("div", { class: "wheel-actions" }, [spinBtn, clearBtn]));
  side.appendChild(el("div", { class: "help" }, "Vybraný tým po animaci zmizí z kola, aby se nemohl vylosovat znovu."));

  wrap.appendChild(side);
  view.appendChild(wrap);
}

function wheelPoint(cx, cy, r, angleDeg) {
  const a = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

function wheelSlicePath(cx, cy, r, startAngle, endAngle) {
  const start = wheelPoint(cx, cy, r, startAngle);
  const end = wheelPoint(cx, cy, r, endAngle);
  const largeArc = endAngle - startAngle > 180 ? 1 : 0;
  return [
    "M", cx, cy,
    "L", start.x, start.y,
    "A", r, r, 0, largeArc, 1, end.x, end.y,
    "Z",
  ].join(" ");
}

function renderSchedule(view) {
  view.appendChild(el("h2", null, "Rozlosování zápasů"));
  view.appendChild(el("div", { class: "sub" }, state.groupMatches.length + " zápasů ve skupině v " +
    (state.groupMatches.length ? state.groupMatches[state.groupMatches.length-1].round : 0) + " kolech."));

  if (!state.groupMatches.length) {
    view.appendChild(el("div", { class: "empty" }, "Zatím žádné rozlosování. Jdi do Nastavení a spusť turnaj."));
    return;
  }
  const byRound = {};
  state.groupMatches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
  Object.keys(byRound).map(Number).sort((a,b) => a-b).forEach(r => {
    view.appendChild(el("div", { class: "round-title" }, "Kolo " + r));
    const grid = el("div", { class: "matches" });
    byRound[r].forEach(m => grid.appendChild(scheduleMatchCard(m)));
    view.appendChild(grid);
  });
}

function scheduleMatchCard(m) {
  const card = el("div", { class: "match" });
  card.appendChild(el("div", { class: "head" }, [
    el("span", { class: "tag" }, "Zápas " + m.id.slice(1)),
    el("span", { class: "pill" }, formatGroupMatchScore(m)),
  ]));
  const s1 = el("div", { class: "side" });
  appendPlayerName(s1, m.p1);
  card.appendChild(s1);
  const s2 = el("div", { class: "side" });
  appendPlayerName(s2, m.p2);
  card.appendChild(s2);
  return card;
}

function renderGroup(view) {
  const standings = computeStandings(state.players.map(p => p.name), state.groupMatches);
  const playedCount = state.groupMatches.filter(m => m.played).length;

  view.appendChild(el("h2", null, "Skupinová fáze"));
  view.appendChild(el("div", { class: "sub" }, "Každý s každým, odehráno " + playedCount + " / " + state.groupMatches.length + " zápasů."));
  view.appendChild(el("h3", { style: "margin: 6px 0 6px; font-size:14px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em;" }, "Tabulka"));

  const tbl = el("table");
  tbl.appendChild(el("thead", null, el("tr", null, ["#", "Hráč", "Tým", "Z", "V", "VP", "PP", "R", "P", "VG", "IG", "RG", "Body"].map(h => el("th", null, h)))));
  const tbody = el("tbody");
  standings.forEach((row, i) => {
    const tr = el("tr", { class: (i < state.playoffConfig.size ? "qualifier " : "") + (i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "") });
    tr.appendChild(el("td", null, String(i+1)));
    tr.appendChild(el("td", { style: "text-align:left; font-weight:600" }, row.p));
    tr.appendChild(el("td", { style: "text-align:left; color: var(--accent-2); font-size: 12px; text-transform: uppercase; letter-spacing:.03em" }, (getPlayer(row.p) || {}).team || "—"));
    tr.appendChild(el("td", null, String(row.mp)));
    tr.appendChild(el("td", null, String(row.w)));
    tr.appendChild(el("td", null, String(row.otw || 0)));
    tr.appendChild(el("td", null, String(row.otl || 0)));
    tr.appendChild(el("td", null, String(row.d)));
    tr.appendChild(el("td", null, String(row.l)));
    tr.appendChild(el("td", null, String(row.gf)));
    tr.appendChild(el("td", null, String(row.ga)));
    tr.appendChild(el("td", null, (row.gd > 0 ? "+" : "") + row.gd));
    tr.appendChild(el("td", { style: "font-weight:700" }, String(row.pts)));
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  view.appendChild(tbl);
  view.appendChild(el("div", { class: "help" }, "Do playoff postupuje nejlepších " + state.playoffConfig.size + ". V = výhra v základní době, VP = výhra po prodloužení/penaltách, PP = prohra po prodloužení/penaltách."));

  view.appendChild(el("h3", { style: "margin: 22px 0 6px; font-size:14px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em;" }, "Zápasy"));
  if (!state.groupMatches.length) {
    view.appendChild(el("div", { class: "empty" }, "Zatím žádné zápasy."));
    return;
  }
  const byRound = {};
  state.groupMatches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
  Object.keys(byRound).map(Number).sort((a,b) => a-b).forEach(r => {
    view.appendChild(el("div", { class: "round-title" }, "Kolo " + r));
    const grid = el("div", { class: "matches" });

function groupMatchCard(m) {
  const card = el("div", { class: "match" });
  card.appendChild(el("div", { class: "head" }, [
    el("span", { class: "tag" }, "Zápas " + m.id.slice(1)),
    el("span", { class: "pill" }, groupMatchStatus(m)),
  ]));

  const g1 = el("input", { type: "number", min: "0", class: "score", value: m.played ? String(m.g1) : "" });
  const g2 = el("input", { type: "number", min: "0", class: "score", value: m.played ? String(m.g2) : "" });
  const winner = groupMatchWinner(m);
  const loser = groupMatchLoser(m);
  const s1 = el("div", { class: "side" + (winner === m.p1 ? " win" : loser === m.p1 ? " lose" : "") });
  appendPlayerName(s1, m.p1);
  s1.appendChild(g1);
  const s2 = el("div", { class: "side" + (winner === m.p2 ? " win" : loser === m.p2 ? " lose" : "") });
  appendPlayerName(s2, m.p2);
  s2.appendChild(g2);
  card.appendChild(s1);
  card.appendChild(s2);

  const extra = el("div", { class: "extra", style: "display:none" });
  const ot1 = el("input", { type: "number", min: "0", class: "score", value: String(m.ot1 || 0) });
  const ot2 = el("input", { type: "number", min: "0", class: "score", value: String(m.ot2 || 0) });
  extra.appendChild(el("div", { class: "row" }, [
    el("label", { class: "field" }, ["Prodloužení (" + m.p1 + ")", ot1]),
    el("label", { class: "field" }, ["Prodloužení (" + m.p2 + ")", ot2]),
  ]));

  const penRow = el("div", { class: "row", style: "margin-top:6px; display:none" });
  const penA = el("label", null, [el("input", { type: "radio", name: "group-pen-" + m.id, value: "1" }), " Penalty: " + m.p1]);
  const penB = el("label", null, [el("input", { type: "radio", name: "group-pen-" + m.id, value: "2" }), " Penalty: " + m.p2]);
  if (m.penWinner === 1) penA.firstChild.checked = true;
  if (m.penWinner === 2) penB.firstChild.checked = true;
  penRow.appendChild(penA);
  penRow.appendChild(penB);
  extra.appendChild(penRow);
  card.appendChild(extra);

  function maybeShowGroupExtra() {
    const v1 = parseScoreInput(g1.value);
    const v2 = parseScoreInput(g2.value);
    if (!Number.isFinite(v1) || !Number.isFinite(v2) || v1 !== v2) {
      extra.style.display = "none";
      return false;
    }
    extra.style.display = "block";
    const o1 = parseScoreInput(ot1.value);
    const o2 = parseScoreInput(ot2.value);
    penRow.style.display = Number.isFinite(o1) && Number.isFinite(o2) && o1 === o2 ? "flex" : "none";
    return true;
  }
  g1.addEventListener("input", maybeShowGroupExtra);
  g2.addEventListener("input", maybeShowGroupExtra);
  ot1.addEventListener("input", maybeShowGroupExtra);
  ot2.addEventListener("input", maybeShowGroupExtra);
  if (m.played) maybeShowGroupExtra();

  const save = el("button", null, m.played ? "Aktualizovat" : "Uložit výsledek");
  const clr  = el("button", { class: "ghost" }, "Smazat");
  const foot = el("div", { class: "foot" }, [save, clr]);
  card.appendChild(foot);

  save.addEventListener("click", () => {
    const v1 = parseScoreInput(g1.value);
    const v2 = parseScoreInput(g2.value);
    [g1, g2, ot1, ot2].forEach(i => i.classList.remove("invalid"));
    if (!Number.isFinite(v1) || !Number.isFinite(v2)) {
      [g1, g2].forEach(i => { if (!Number.isFinite(parseScoreInput(i.value))) i.classList.add("invalid"); });
      return;
    }
    m.g1 = v1; m.g2 = v2;
    if (v1 === v2) {
      const o1 = parseScoreInput(ot1.value);
      const o2 = parseScoreInput(ot2.value);
      if (!Number.isFinite(o1) || !Number.isFinite(o2)) {
        [ot1, ot2].forEach(i => { if (!Number.isFinite(parseScoreInput(i.value))) i.classList.add("invalid"); });
        return;
      }
      m.ot1 = o1; m.ot2 = o2;
      const total1 = v1 + o1;
      const total2 = v2 + o2;
      if (total1 === total2) {
        const r = card.querySelector('input[name="group-pen-' + m.id + '"]:checked');
        if (!r) { alert("Pokud prodloužení nerozhodne, je nutné vybrat vítěze penalty."); return; }
        m.penWinner = parseInt(r.value, 10);
      } else {
        m.penWinner = null;
      }
    } else {
      m.ot1 = 0; m.ot2 = 0; m.penWinner = null;
    }
    m.played = true;
    saveState(); render();
  });
  clr.addEventListener("click", () => {
    m.g1 = null; m.g2 = null; m.ot1 = 0; m.ot2 = 0; m.penWinner = null; m.played = false;
    saveState(); render();
  });
  return card;
}

function renderPlayoff(view) {
  view.appendChild(el("h2", null, "Playoff"));
  const standings = computeStandings(state.players.map(p => p.name), state.groupMatches);
  const allPlayed = state.groupMatches.every(m => m.played);
  const canGenerate = standings.length >= 2;
  view.appendChild(el("div", { class: "sub" }, allPlayed
    ? "Všechny zápasy ve skupině jsou odehrány. Vytvoř pavouka a dobojuj turnaj!"
    : "Pavouka můžeš vytvořit už teď podle aktuální tabulky, ale po odehrání zbývajících zápasů se nasazení může změnit."));

  // Config
  const cfg = state.playoffConfig;
  const sizeSel = el("select");
  [2,4,6,8].forEach(n => {
    const opt = el("option", { value: String(n) }, "Nejlepších " + n);
    if (cfg.size === n) opt.selected = true;
    sizeSel.appendChild(opt);
  });
  sizeSel.addEventListener("change", () => { cfg.size = parseInt(sizeSel.value, 10); saveState(); render(); });
  const boSel = el("select");
  [{v:1, l:"Jeden zápas"}, {v:3, l:"Na 2 vítězné (Bo3)"}].forEach(o => {
    const opt = el("option", { value: String(o.v) }, o.l);
    if (cfg.bestOf === o.v) opt.selected = true;
    boSel.appendChild(opt);
  });
  boSel.addEventListener("change", () => { cfg.bestOf = parseInt(boSel.value, 10); saveState(); render(); });

  const gen = el("button", null, (state.playoff.final || state.playoff.sf.length) ? "Vygenerovat pavouka znovu" : "Vygenerovat pavouka");
  gen.disabled = !canGenerate;
  gen.addEventListener("click", () => {
    if (state.playoff.final || state.playoff.sf.length || state.playoff.qf.length) {
      if (!confirm("Vygenerováním se vymažou aktuální výsledky playoff. Pokračovat?")) return;
    }
    const seeds = standings.slice(0, cfg.size).map(r => r.p);
    state.qualifiers = seeds;
    state.playoff = buildPlayoff(seeds, cfg.size, cfg.bestOf);
    saveState(); render();
  });

  const cfgRow = el("div", { class: "row" }, [
    el("label", { class: "field" }, ["Velikost pavouka", sizeSel]),
    el("label", { class: "field" }, ["Formát", boSel]),
    gen,
  ]);
  view.appendChild(cfgRow);

  if (!state.qualifiers.length) {
    view.appendChild(el("div", { class: "empty" }, "Pavouk zatím není. Klikni na „Vygenerovat pavouka\" výše."));
    return;
  }

  // Bracket columns
  const cfgSize = state.playoffConfig.size;
  const bracket = el("div", { class: "bracket" });

  if (cfgSize === 2) {
    bracket.appendChild(bracketCol("Finále", [state.playoff.final]));
    bracket.appendChild(bracketCol("Zápas o 3. místo", [state.playoff.bronze]));
  } else if (cfgSize === 4) {
    bracket.appendChild(bracketCol("Semifinále", state.playoff.sf));
    bracket.appendChild(bracketCol("Finále", [state.playoff.final]));
    bracket.appendChild(bracketCol("Zápas o 3. místo", [state.playoff.bronze]));
  } else if (cfgSize === 6) {
    bracket.appendChild(bracketCol("Předkolo", state.playoff.qf));
    bracket.appendChild(bracketCol("Semifinále", state.playoff.sf));
    bracket.appendChild(bracketCol("Finále", [state.playoff.final]));
    bracket.appendChild(bracketCol("Zápas o 3. místo", [state.playoff.bronze]));
  } else if (cfgSize === 8) {
    bracket.appendChild(bracketCol("Čtvrtfinále", state.playoff.qf));
    bracket.appendChild(bracketCol("Semifinále", state.playoff.sf));
    bracket.appendChild(bracketCol("Finále", [state.playoff.final]));
    bracket.appendChild(bracketCol("Zápas o 3. místo", [state.playoff.bronze]));
  }
  view.appendChild(bracket);

  // Quick crown if everything done
  if (state.champion) {
    const note = el("div", { class: "row", style: "margin-top:8px" }, [
      el("span", { class: "pill gold" }, "Vítěz: " + state.champion),
      el("span", { class: "pill bronze" }, "3. místo: " + (state.bronzeWinner || "neurčeno")),
    ]);
    view.appendChild(note);
  }
}

function bracketCol(title, matches) {
  const col = el("div", { class: "bracket-col" });
  col.appendChild(el("h3", null, title));
  matches.forEach(m => col.appendChild(playoffMatchCard(m)));
  return col;
}

function playoffMatchCard(m) {
  if (!m) return el("div");
  const card = el("div", { class: "match" });
  const tag = m.id === "f1" ? "Finále" : m.id === "b1" ? "O 3. místo" :
              m.id.startsWith("s") ? "SF" : m.id.startsWith("q") ? "ČF" : "Zápas";
  const isBronze = m.id === "b1";
  const winner = matchWinner(m);
  const loser  = matchLoser(m);

  card.appendChild(el("div", { class: "head" }, [
    el("span", { class: "tag" }, tag),
    el("span", { class: "pill" }, m.played ? "Odehráno" : (m.a && m.b ? "Čeká se" : "Bude určeno")),
  ]));

  // Sides
  const s1 = el("div", { class: "side" + (winner === m.a ? " win" : loser === m.a ? " lose" : "") });
  appendPlayerName(s1, m.a);
  const g1 = el("input", { type: "number", min: "0", class: "score" });
  g1.value = m.played ? String(m.g1) : "";
  g1.disabled = !m.a || !m.b;
  s1.appendChild(g1);
  card.appendChild(s1);

  const s2 = el("div", { class: "side" + (winner === m.b ? " win" : loser === m.b ? " lose" : "") });
  appendPlayerName(s2, m.b);
  const g2 = el("input", { type: "number", min: "0", class: "score" });
  g2.value = m.played ? String(m.g2) : "";
  g2.disabled = !m.a || !m.b;
  s2.appendChild(g2);
  card.appendChild(s2);

  // Extra (overtime + penalties) — only if both players and the regular score is a draw
  const extra = el("div", { class: "extra", style: "display:none" });
  const ot1 = el("input", { type: "number", min: "0", class: "score", value: String(m.ot1 || 0) });
  const ot2 = el("input", { type: "number", min: "0", class: "score", value: String(m.ot2 || 0) });
  const otRow = el("div", { class: "row" }, [
    el("label", { class: "field" }, ["Prodloužení (A)", ot1]),
    el("label", { class: "field" }, ["Prodloužení (B)", ot2]),
  ]);
  extra.appendChild(otRow);

  const penRow = el("div", { class: "row", style: "margin-top:6px" });
  const penA = el("label", null, [el("input", { type: "radio", name: "pen-" + m.id, value: "1" }), " Penalty: " + (m.a || "A")]);
  const penB = el("label", null, [el("input", { type: "radio", name: "pen-" + m.id, value: "2" }), " Penalty: " + (m.b || "B")]);
  if (m.penWinner === 1) penA.firstChild.checked = true;
  if (m.penWinner === 2) penB.firstChild.checked = true;
  penRow.appendChild(penA);
  penRow.appendChild(penB);
  extra.appendChild(penRow);
  card.appendChild(extra);

  function maybeShowExtra() {
    const v1 = parseScoreInput(g1.value);
    const v2 = parseScoreInput(g2.value);
    if (v1 == null || v2 == null) { extra.style.display = "none"; return false; }
    const tied = v1 === v2;
    extra.style.display = tied ? "block" : "none";
    return tied;
  }
  g1.addEventListener("input", maybeShowExtra);
  g2.addEventListener("input", maybeShowExtra);
  if (m.played) maybeShowExtra();

  // Save
  const save = el("button", null, m.played ? "Aktualizovat" : "Uložit výsledek");
  const clr  = el("button", { class: "ghost" }, "Smazat");
  const foot = el("div", { class: "foot" }, [save, clr]);
  card.appendChild(foot);

  save.addEventListener("click", () => {
    [g1, g2].forEach(i => i.classList.remove("invalid"));
    if (!m.a || !m.b) return;
    const v1 = parseScoreInput(g1.value);
    const v2 = parseScoreInput(g2.value);
    if (v1 == null || v2 == null) {
      [g1, g2].forEach(i => { if (parseScoreInput(i.value) == null) i.classList.add("invalid"); });
      return;
    }
    let total1 = v1, total2 = v2, otv1 = 0, otv2 = 0, penW = null;
    if (v1 === v2) {
      otv1 = Math.max(0, parseInt(ot1.value, 10) || 0);
      otv2 = Math.max(0, parseInt(ot2.value, 10) || 0);
      total1 += otv1; total2 += otv2;
      if (total1 === total2) {
        // Shootout required
        const r = penRow.querySelector("input[type=radio]:checked");
        if (!r) { alert("Pokud prodloužení nerozhodne, je nutné vybrat vítěze penalty."); return; }
        penW = parseInt(r.value, 10);
      }
    }
    m.g1 = v1; m.g2 = v2;
    m.ot1 = otv1; m.ot2 = otv2;
    m.penWinner = penW;
    m.played = true;
    advancePlayoff();
    saveState(); render();
  });
  clr.addEventListener("click", () => {
    m.g1 = null; m.g2 = null; m.ot1 = 0; m.ot2 = 0; m.penWinner = null; m.played = false;
    advancePlayoff();
    saveState(); render();
  });

  // Style hint
  if (isBronze && m.played) card.style.borderColor = "rgba(205,127,50,.4)";
  return card;
}

function renderChampion(view) {
  view.appendChild(el("h2", null, "Vítěz turnaje"));
  if (!state.champion) {
    view.appendChild(el("div", { class: "empty" }, "Turnaj ještě neskončil. Odehraj finále a máme vítěze."));
    return;
  }
  const podium = el("div", { class: "podium" });
  podium.appendChild(el("div", { class: "card gold-card" }, [
    el("div", { class: "sub" }, "1. místo"),
    el("div", { class: "trophy" }, "🏆"),
    el("div", { class: "name" }, state.champion),
  ]));
  podium.appendChild(el("div", { class: "card bronze-card" }, [
    el("div", { class: "sub" }, "3. místo"),
    el("div", { class: "trophy" }, "🥉"),
    el("div", { class: "name" }, state.bronzeWinner || "—"),
  ]));
  view.appendChild(podium);

  // Top-4 summary
  const standings = computeStandings(state.players.map(p => p.name), state.groupMatches);
  if (standings.length) {
    view.appendChild(el("h3", { style: "margin-top:24px; font-size:14px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em;" }, "Konečné pořadí"));
    const tbl = el("table");
    tbl.appendChild(el("thead", null, el("tr", null, ["#", "Hráč", "Tým", "Z", "V", "VP", "PP", "R", "P", "VG", "IG", "RG", "Body"].map(h => el("th", null, h)))));
    const tb = el("tbody");
    standings.forEach((r, i) => {
      const tr = el("tr", { class: i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "" });
      tr.appendChild(el("td", null, String(i+1)));
      tr.appendChild(el("td", { style: "text-align:left; font-weight:600" }, r.p));
      tr.appendChild(el("td", { style: "text-align:left; color: var(--accent-2); font-size: 12px; text-transform: uppercase; letter-spacing:.03em" }, (getPlayer(r.p) || {}).team || "—"));
      tr.appendChild(el("td", null, String(r.mp)));
      tr.appendChild(el("td", null, String(r.w)));
      tr.appendChild(el("td", null, String(r.otw || 0)));
      tr.appendChild(el("td", null, String(r.otl || 0)));
      tr.appendChild(el("td", null, String(r.d)));
      tr.appendChild(el("td", null, String(r.l)));
      tr.appendChild(el("td", null, String(r.gf)));
      tr.appendChild(el("td", null, String(r.ga)));
      tr.appendChild(el("td", null, (r.gd > 0 ? "+" : "") + r.gd));
      tr.appendChild(el("td", { style: "font-weight:700" }, String(r.pts)));
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
    view.appendChild(tbl);
  }

  const row = el("div", { class: "row", style: "margin-top:18px" });
  const again = el("button", null, "Nový turnaj");
  again.addEventListener("click", resetTournament);
  row.appendChild(again);
  view.appendChild(row);
}

// Boot
render();
</script>
